# Docker Compose - PostgreSQL + API
# aegra dev  -> docker compose up postgres -d  (database only)
# aegra up   -> docker compose up --build      (full stack)

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: fit_agent-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fit_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fit_agent_secret}
      POSTGRES_DB: ${POSTGRES_DB:-fit_agent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fit_agent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  fit_agent:
    build: .
    container_name: fit_agent-api
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fit_agent}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fit_agent_secret}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-fit_agent}
      - AEGRA_CONFIG=aegra.json
      - AUTH_TYPE=${AUTH_TYPE:-noop}
      - PORT=${PORT:-8000}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      start_period: 10s
    volumes:
      - ./src:/app/src:ro
      - ./aegra.json:/app/aegra.json:ro

  voice_proxy:
    build:
      context: .
      dockerfile: Dockerfile.voice
    container_name: fit_agent-voice
    ports:
      - "${VOICE_PROXY_PORT:-8001}:8001"
    env_file:
      - .env
    environment:
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY}
      - VOICE_PROXY_PORT=8001

volumes:
  postgres_data:
