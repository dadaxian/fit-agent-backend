name: fit-swift
options:
  bundleIdPrefix: com.fitflow
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
targets:
  fit-swift:
    type: application
    platform: iOS
    sources:
      - path: fit-swift
        excludes:
          - "*.xcassets"
    settings:
      base:
        INFOPLIST_FILE: fit-swift/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: MarkdownUI
packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0
